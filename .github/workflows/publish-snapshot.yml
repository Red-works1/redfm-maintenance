name: Publish dashboard snapshot
on:
  schedule:
    - cron: '0 * * * *'      # hourly
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build snapshot
        run: node publish-snapshot.js
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      - name: Commit snapshot if changed
        run: |
          git config user.name "snapshot-bot"
          git config user.email "snapshot-bot@users.noreply.github.com"
          git add data-snapshot.json
          git diff --staged --quiet || git commit -m "Update dashboard snapshot"
          git push
