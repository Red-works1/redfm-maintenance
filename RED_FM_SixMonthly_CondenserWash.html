<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RED FM — Six-monthly condenser wash</title>
<style>
  :root{--red:#E01322;--ink:#15151a;--grey:#6b6b72;--line:#e3e3e8;--bg:#f5f5f7;--ok:#1a7f37;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);}
  header{background:#fff;border-bottom:4px solid var(--red);padding:14px 16px;position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:12px;}.logo{font-weight:800;letter-spacing:1px;font-size:26px;}.logo b{color:var(--red);}
  .htitle{font-size:13px;color:var(--grey);line-height:1.2;}.htitle strong{display:block;color:var(--ink);font-size:16px;}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px 120px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:12px;}
  .hgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--grey);margin-bottom:4px;}
  input,textarea{width:100%;font-size:16px;padding:11px;border:1.5px solid var(--line);border-radius:9px;}
  input:focus,textarea:focus{outline:none;border-color:var(--red);}
  .note{font-size:13px;color:var(--grey);background:#fff;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;margin-top:12px;}
  .secbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .secbtn{flex:1;min-width:56px;font-size:18px;font-weight:800;padding:12px 0;border-radius:11px;border:1.5px solid var(--line);background:#fff;color:var(--grey);cursor:pointer;}
  .secbtn.on{background:var(--red);color:#fff;border-color:var(--red);}.secbtn .n{display:block;font-size:11px;font-weight:600;margin-top:2px;opacity:.85;}
  .item{border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-top:10px;}
  .item.done{border-color:var(--ok);background:#f4faf5;}
  .trow{display:flex;align-items:center;gap:10px;}
  .chk{width:30px;height:30px;border:2px solid var(--line);border-radius:7px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;background:#fff;cursor:pointer;}
  .chk.on{background:var(--ok);border-color:var(--ok);}
  .tname{font-size:15px;font-weight:600;}
  .fields{display:none;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}.item.done .fields{display:grid;}
  .fields .full{grid-column:1/3;}.lab{font-size:11px;color:var(--grey);font-weight:600;margin-bottom:3px;}
  .btn{font-size:16px;font-weight:700;padding:14px 18px;border-radius:11px;border:0;cursor:pointer;}
  .btn-red{background:var(--red);color:#fff;}.btn-ghost{background:#fff;color:var(--red);border:1.5px solid var(--red);}
  .bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px 14px;z-index:20;}
  .bar .inner{max-width:760px;margin:0 auto;}.bar .btn{width:100%;}
  .muted{color:var(--grey);font-size:12px;}h3{font-size:14px;margin:16px 4px 0;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:80px;background:var(--ink);color:#fff;padding:11px 16px;border-radius:10px;opacity:0;transition:.2s;z-index:30;font-weight:600;}
  .toast.show{opacity:1;}
  @media print{.bar,.toast,.secbar{display:none!important}header{position:static}.fields{display:grid!important}}
</style>
</head>
<body>
<header><div class="brand"><div class="logo">RED<b>FM</b></div>
<div class="htitle"><strong>Six-monthly — condenser &amp; oil-cooler wash</strong>Border Holdings — Avonmouth · min. 2×/yr, monthly Jun–Sep</div><a href="index.html" aria-label="Back to hub" style="margin-left:auto;flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:#15151a;font-weight:700;font-size:13px;border:1.5px solid #e3e3e8;border-radius:9px;padding:8px 11px;background:#fff;white-space:nowrap"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Hub</a></div></header>

<div class="wrap">
  <div class="card"><div class="hgrid">
    <div><label>Date of this visit</label><input id="hDate" type="date"></div>
    <div><label>Engineer <span style="color:var(--red)">*</span></label><input id="hEng" placeholder="Name"></div>
  </div></div>

  <div class="note"><b>Tick what you washed this visit.</b> The same unit can be logged again later — through the summer it's washed monthly, so each visit adds its own dated record.</div>

  <div class="secbar" id="secbar"></div>
  <div id="prog" class="note" style="color:#1a7f37;font-weight:700;display:none"></div>
  <div id="body"></div>

  <h3>Comments (this visit)</h3>
  <div class="card"><textarea id="hComm" rows="3" placeholder="e.g. all jet-washed clean — vegetation on all"></textarea></div>

  <div id="summary" class="card" style="display:none"><strong id="sumHead"></strong><div id="sumBody" style="margin-top:8px"></div></div>
</div>

<div class="bar"><div class="inner"><button class="btn btn-red" id="finish">Finish &amp; submit this visit</button></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="redfm-data.js?v=5"></script>
<script src="redfm-draft.js?v=1"></script>
<script>
const WASH={
 "A":["A section — air-cooled condenser","A section — air-cooled oil cooler"],
 "B":["B section — air-cooled condenser","B section — air-cooled oil cooler"],
 "C":["C1 — air-cooled condenser","C2 — air-cooled condenser","C3 — air-cooled condenser","C4 — air-cooled condenser"],
 "D":["D1 — air-cooled condenser","D2 — air-cooled condenser","D3 — air-cooled condenser","D4 — air-cooled condenser"],
 "E":["E1 — air-cooled condenser","E2 — air-cooled condenser"]
};
const $=id=>document.getElementById(id);
const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'').slice(0,80);
const ddmm=d=>{const p=String(d).slice(0,10).split('-');return (+p[2])+'/'+(+p[1]);};
const SNAP='https://raw.githubusercontent.com/Red-works1/redfm-maintenance/main/data-snapshot.json';
$('hDate').value=new Date().toISOString().slice(0,10);
const SECS=Object.keys(WASH);let cur=SECS[0];const state={};let doneMap={},periodLabel='';
const secbar=$('secbar');
SECS.forEach(s=>{const b=document.createElement('button');b.className='secbtn'+(s===cur?' on':'');
  b.innerHTML=`${s}<span class="n">section</span>`;b.onclick=()=>{cur=s;draw();};secbar.appendChild(b);});

function uid(s,i){return `${s}_${i}`;}
function draw(){
  [...secbar.children].forEach((b,i)=>b.className='secbtn'+(SECS[i]===cur?' on':''));
  const root=$('body');root.innerHTML='';
  WASH[cur].forEach((name,i)=>{
    const id=uid(cur,i);const st=state[id]||{};
    const dn=(!st.done)?doneMap[slug('wash '+name)+'||'+name]:null;
    const d=document.createElement('div');
    if(dn){
      d.className='item done';
      d.innerHTML=`<div class="trow"><div class="chk on" data-id="${id}" data-dn="1" title="Washed ${dn.date}${dn.eng?(' by '+dn.eng):''} — tap to log another">✓</div>
        <div class="tname">${name} <span style="color:#1a7f37;font-size:11px;font-weight:700">· washed ${ddmm(dn.date)} this period</span></div></div>
        <div class="muted" style="margin-top:4px;padding-left:2px">Recorded ${dn.date}${dn.eng?(' by '+dn.eng):''}. Tap the tick to log another wash.</div>`;
    }else{
      d.className='item'+(st.done?' done':'');
      d.innerHTML=`<div class="trow"><div class="chk${st.done?' on':''}" data-id="${id}">${st.done?'✓':''}</div><div class="tname">${name}</div></div>
        <div class="fields">
          <div><div class="lab">Date washed</div><input data-f="date" data-id="${id}" type="date" value="${st.date||$('hDate').value}"></div>
          <div class="full"><div class="lab">Comments (optional)</div><input data-f="comment" data-id="${id}" placeholder="e.g. vegetation, extra clean needed" value="${st.comment||''}"></div>
        </div>`;
    }
    root.appendChild(d);
  });
  root.querySelectorAll('.chk[data-dn]').forEach(c=>c.onclick=()=>guardChange(c.dataset.id));
  root.querySelectorAll('.chk:not([data-dn])').forEach(c=>c.onclick=()=>{const id=c.dataset.id;state[id]=state[id]||{};
    state[id].done=!state[id].done;if(state[id].done&&!state[id].date)state[id].date=$('hDate').value;draw();});
  root.querySelectorAll('input[data-f]').forEach(inp=>inp.oninput=()=>{const id=inp.dataset.id;state[id]=state[id]||{};state[id][inp.dataset.f]=inp.value;});
  updateProgress();
}
draw();

// --- progressive completion: which units already washed THIS six-month period (Jul–Dec / Jan–Jun) ---
function curHalf(){const n=new Date();const m=n.getMonth();
  if(m>=6)return {s:new Date(n.getFullYear(),6,1),e:new Date(n.getFullYear()+1,0,1),label:'Jul–Dec '+n.getFullYear()};
  return {s:new Date(n.getFullYear(),0,1),e:new Date(n.getFullYear(),6,1),label:'Jan–Jun '+n.getFullYear()};}
function inHalf(ds,s,e){if(!ds)return false;const d=new Date(ds);return d>=s&&d<e;}
function updateProgress(){const el=$('prog');if(!el)return;
  const total=SECS.reduce((n,s)=>n+WASH[s].length,0),done=Object.keys(doneMap).length;
  if(done){el.style.display='block';el.textContent=periodLabel+' — '+done+' of '+total+' units already washed this period (green). Tap a tick to log another.';}
  else el.style.display='none';}
function guardChange(id){const us=id.split('_');const idx=+us.pop();const sec=us.join('_');const name=(WASH[sec]||[])[idx];if(!name)return;
  const dn=doneMap[slug('wash '+name)+'||'+name];if(!dn)return;
  if(!confirm('This unit was logged as washed on '+dn.date+(dn.eng?(' by '+dn.eng):'')+'.\n\nLog another wash for it this period? The new record will be dated today.'))return;
  state[id]={done:true,date:$('hDate').value};draw();}
async function loadDone(){
  try{const res=await fetch(SNAP+'?t='+Date.now());if(!res.ok)return;const snap=await res.json();
    const {s,e,label}=curHalf();periodLabel=label;
    const vmap={};(snap.visits||[]).forEach(v=>{if((v.ServiceType||'')==='Six-monthly'&&inHalf(v.VisitDate,s,e))vmap[v.Title]={date:String(v.VisitDate).slice(0,10),eng:v.Engineer||''};});
    (snap.readings||[]).forEach(rd=>{const vi=vmap[rd.VisitRef];if(!vi)return;
      const k=rd.ReadingKey+'||'+rd.Asset;const wd=(/Washed (\d{4}-\d{2}-\d{2})/.exec(rd.Value||'')||[])[1]||vi.date;
      const c=doneMap[k];if(!c||vi.date>c.vdate)doneMap[k]={date:wd,eng:vi.eng,vdate:vi.date};});
    draw();
  }catch(e){/* no snapshot yet — blank wash sheet */}
}
loadDone();

function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700);}

// Connect to SharePoint if the shared data layer is present + configured
let redfmReady=!!window.REDFM, signedIn=false;
if(redfmReady){REDFM.init().then(s=>{signedIn=s;}).catch(()=>{redfmReady=false;});}

let submitted=false;
$('finish').addEventListener('click',async()=>{
  if(submitted)return;
  if(!$('hEng').value.trim()){toast('Enter engineer name');return;}
  const rows=[];
  SECS.forEach(s=>WASH[s].forEach((name,i)=>{const st=state[uid(s,i)];
    if(st&&st.done)rows.push({section:s,item:name,date:st.date||$('hDate').value,comment:st.comment||'',engineer:$('hEng').value.trim()});}));
  if(rows.length===0){toast('Tick what you washed today');return;}
  const r={sheet:"Six-monthly condenser & oil-cooler wash",site:"Border Holdings — Avonmouth",deliveredBy:"Coolstream",
    visitDate:$('hDate').value,engineer:$('hEng').value.trim(),comments:$('hComm').value.trim(),
    washes:rows,submittedAt:new Date().toISOString(),ref:'6M-'+Date.now().toString(36).toUpperCase()};

  // Save to SharePoint (ServiceVisit header + one Readings row per washed unit), then file a branded PDF
  let saveMsg='SharePoint not configured yet — kept a local copy.';
  if(redfmReady){
    $('finish').textContent='Saving…';
    try{
      if(!signedIn){await REDFM.signIn();signedIn=true;}
      const sections=[...new Set(rows.map(e=>e.section))].join(', ');
      const visitFields={Title:r.ref,ServiceType:"Six-monthly",
        PlantSection:sections,Engineer:r.engineer,VisitDate:r.visitDate,
        Status:"Partially completed",FaultFound:"No",Notes:r.comments};
      const readingRows=rows.map((e,i)=>({Title:r.ref+'-'+(i+1),
        ReadingKey:slug('wash '+e.item),Asset:e.item,
        Value:'Washed '+e.date+(e.comment?(' — '+e.comment):''),Unit:'',OutOfRange:'No'}));
      await REDFM.saveVisit(visitFields,readingRows);
      REDFMDraft.clear(); // submitted online — drop the local draft
      saveMsg='Saved to SharePoint ✓ — '+readingRows.length+' wash record(s)';
      // generate + file a branded PDF copy in the Reports library (one grid table per section)
      try{
        // cumulative period report: every unit washed THIS period with the date it was done
        const grid=[];
        SECS.forEach(s=>{
          const gr=[];
          WASH[s].forEach((name,i)=>{const st=state[uid(s,i)];
            if(st&&st.done){gr.push([name, st.date||r.visitDate, st.comment||'']);return;}
            const dn=doneMap[slug('wash '+name)+'||'+name];
            if(dn)gr.push([name, dn.date, 'recorded earlier this period'+(dn.eng?(' · '+dn.eng):'')]);});
          if(gr.length)grid.push({name:'Section '+s+' — condenser/oil-cooler wash',cols:['Date washed','Comments'],rows:gr});
        });
        const blob=REDFM.buildReportPdf({title:'Six-monthly wash report — '+(periodLabel||'this period'),
          subtitle:'Border Holdings, Avonmouth · cumulative — date shows when each unit was washed',
          ref:r.ref,date:r.visitDate,engineer:r.engineer,plant:sections,
          extra:[['Period',periodLabel||'—'],['As at',r.visitDate]]},grid);
        const fname='SixMonthly_Wash_'+(periodLabel||'period').replace(/[^A-Za-z0-9]+/g,'')+'_ason_'+r.visitDate+'_'+r.ref+'.pdf';
        await REDFM.uploadReportPdf(fname,blob);
        saveMsg+=' · PDF filed';
      }catch(pe){saveMsg+=' (PDF skipped: '+(pe.message||pe)+')';}
    }catch(err){saveMsg='Could not save online — kept a local copy. ('+(err.message||err)+')';}
  }

  submitted=true;
  document.querySelectorAll('input,textarea,.chk,.secbtn').forEach(e=>{e.disabled=true;e.style.pointerEvents='none';e.style.opacity=.9;});
  $('finish').style.display='none';$('summary').style.display='block';
  $('sumHead').textContent=`✓ Submitted — ref ${r.ref}`;
  $('sumBody').innerHTML=`<div>${r.visitDate} · ${r.engineer} · ${rows.length} unit(s) washed this visit</div>
    <div class="muted" style="margin-top:4px">${saveMsg}</div>
    <div class="muted" style="margin-top:4px">Log more washes on the next visit.</div>
    <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-red" id="pr">Print / Save PDF</button>
      <button class="btn btn-ghost" id="dl">Download record (.json)</button></div>`;
  $('summary').scrollIntoView({behavior:'smooth'});
  $('pr').onclick=()=>window.print();
  $('dl').onclick=()=>{const b=new Blob([JSON.stringify(r,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`SixMonthly_Wash_${r.visitDate}_${r.ref}.json`;a.click();};
  toast('Submitted ✓');
});
REDFMDraft.init({key:'sixmonthly',state:state,draw:draw});
</script>
</body>
</html>
